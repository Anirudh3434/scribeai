<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScribeAI Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <header class="header">
      <div class="logo-group">
        <img class="logo-image" src="icon.png" alt="ScribeAI Logo">
        <div>
          <h1 class="logo-text">Scribe<span>AI</span></h1>
          <p class="tagline">Universal writing refinement</p>
        </div>
      </div>
      <div id="status-badge" class="badge demo">Demo Mode</div>
    </header>

    <main class="form-container">
      <!-- Provider Selector -->
      <div class="form-group">
        <label for="api-provider">AI Provider</label>
        <div class="select-wrapper">
          <select id="api-provider">
            <option value="demo">Demo / Simulation Mode (No Key)</option>
            <option value="openai">OpenAI (ChatGPT)</option>
            <option value="gemini">Google Gemini</option>
            <option value="nvidia">NVIDIA NIM / AI</option>
            <option value="ollama">Ollama (100% Local)</option>
          </select>
        </div>
      </div>

      <!-- OpenAI Settings -->
      <div id="openai-settings" class="provider-settings hidden">
        <div class="form-group">
          <div class="label-row">
            <label for="openai-key">OpenAI API Key</label>
            <a href="https://platform.openai.com/api-keys" target="_blank" class="help-link">Get key</a>
          </div>
          <div class="input-wrapper">
            <input type="password" id="openai-key" placeholder="sk-...">
            <button type="button" class="toggle-password" id="toggle-openai-visibility" aria-label="Toggle visibility">
              <svg class="toggle-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="openai-model">Model</label>
          <div class="select-wrapper">
            <select id="openai-model">
              <option value="gpt-4o-mini">gpt-4o-mini (Recommended)</option>
              <option value="gpt-4o">gpt-4o (High Quality)</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Gemini Settings -->
      <div id="gemini-settings" class="provider-settings hidden">
        <div class="form-group">
          <div class="label-row">
            <label for="gemini-key">Gemini API Key</label>
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="help-link">Get key</a>
          </div>
          <div class="input-wrapper">
            <input type="password" id="gemini-key" placeholder="AIzaSy...">
            <button type="button" class="toggle-password" id="toggle-gemini-visibility" aria-label="Toggle visibility">
              <svg class="toggle-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="gemini-model">Model</label>
          <div class="select-wrapper">
            <select id="gemini-model">
              <option value="gemini-1.5-flash-latest">gemini-1.5-flash-latest (Recommended)</option>
              <option value="gemini-1.5-pro-latest">gemini-1.5-pro-latest (High Quality)</option>
              <option value="gemini-flash-latest">gemini-flash-latest</option>
            </select>
          </div>
        </div>
      </div>

      <!-- NVIDIA Settings -->
      <div id="nvidia-settings" class="provider-settings hidden">
        <div class="form-group">
          <div class="label-row">
            <label for="nvidia-key">NVIDIA API Key</label>
            <a href="https://build.nvidia.com" target="_blank" class="help-link">Get key</a>
          </div>
          <div class="input-wrapper">
            <input type="password" id="nvidia-key" placeholder="Using hardcoded key (nvapi-kQoH8m...)">
            <button type="button" class="toggle-password" id="toggle-nvidia-visibility" aria-label="Toggle visibility">
              <svg class="toggle-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="nvidia-model">Model</label>
          <div class="select-wrapper">
            <select id="nvidia-model">
              <option value="meta/llama-3.1-70b-instruct">meta/llama-3.1-70b-instruct (Recommended)</option>
              <option value="nvidia/llama-3.1-nemotron-70b-instruct">nvidia/llama-3.1-nemotron-70b-instruct</option>
              <option value="meta/llama-3.1-8b-instruct">meta/llama-3.1-8b-instruct (Fast)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Ollama Settings -->
      <div id="ollama-settings" class="provider-settings hidden">
        <div class="form-group">
          <div class="label-row">
            <label for="ollama-url">Ollama Local URL</label>
            <span class="help-link">Default: http://localhost:11434</span>
          </div>
          <input type="text" id="ollama-url" placeholder="http://localhost:11434" value="http://localhost:11434">
        </div>

        <div class="form-group">
          <label for="ollama-model">Ollama Model</label>
          <input type="text" id="ollama-model" placeholder="e.g. llama3, gemma2, mistral" value="llama3">
        </div>
      </div>

      <!-- Preferences -->
      <div class="divider">Preferences</div>

      <div class="form-group">
        <label for="default-tone">Default tone</label>
        <div class="select-wrapper">
          <select id="default-tone">
            <option value="improve">Better Grammar & Flow</option>
            <option value="professional">Professional & Polite</option>
            <option value="casual">Friendly & Casual</option>
            <option value="concise">Concise & Short</option>
            <option value="expand">Detailed & Longer</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="custom-instruction">Custom instructions</label>
        <textarea id="custom-instruction" rows="2" placeholder="e.g. Keep it friendly, use active voice, or translate..."></textarea>
      </div>

      <!-- User Account -->
      <div class="divider">User Account</div>
      
      <div id="popup-account-section" class="provider-settings">
        <!-- If logged in -->
        <div id="popup-account-logged-in" class="form-group hidden" style="display: none; flex-direction: column; gap: 4px;">
          <div class="label-row" style="margin-bottom: 2px;">
            <span id="popup-user-name" style="font-size: 13px; font-weight: 700;">Logged in as Alex</span>
            <button type="button" id="popup-logout-btn" class="help-link" style="background:none; border:none; cursor:pointer; font-weight:700;">Log Out</button>
          </div>
          <span id="popup-user-email" style="font-size: 11px; color: var(--muted);">alex@example.com</span>
        </div>

        <!-- If not logged in -->
        <div id="popup-account-logged-out" class="form-group" style="display: flex; flex-direction: column; gap: 10px;">
          <div class="auth-tabs-popup" style="display: flex; border-bottom: 1px solid var(--border); padding-bottom: 2px; gap: 12px; margin-bottom: 2px;">
            <button type="button" class="auth-tab-popup-btn active" id="popup-tab-signin" style="background:none; border:none; border-bottom:2px solid var(--accent); color:var(--accent); font-weight:700; font-size:12px; cursor:pointer; padding-bottom:2px;">Sign In</button>
            <button type="button" class="auth-tab-popup-btn" id="popup-tab-signup" style="background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-weight:700; font-size:12px; cursor:pointer; padding-bottom:2px;">Sign Up</button>
          </div>
          
          <!-- Sign In sub-form -->
          <div id="popup-form-signin" class="popup-auth-form-sub" style="display: flex; flex-direction: column; gap: 8px;">
            <input type="email" id="popup-signin-email" placeholder="Email Address" style="min-height:32px; padding:6px 10px; font-size:12px;">
            <input type="password" id="popup-signin-password" placeholder="Password" style="min-height:32px; padding:6px 10px; font-size:12px;">
            <div id="popup-signin-error" style="font-size:11px; color:var(--danger); min-height:0; text-align:center; font-weight:600;"></div>
            <button type="button" id="popup-submit-signin" class="save-btn" style="min-height:34px; padding:6px; font-size:12.5px; margin-top:2px;">Sign In</button>
          </div>

          <!-- Sign Up sub-form -->
          <div id="popup-form-signup" class="popup-auth-form-sub" style="display: none; flex-direction: column; gap: 8px;">
            <input type="text" id="popup-signup-name" placeholder="Full Name" style="min-height:32px; padding:6px 10px; font-size:12px;">
            <input type="email" id="popup-signup-email" placeholder="Email Address" style="min-height:32px; padding:6px 10px; font-size:12px;">
            <input type="password" id="popup-signup-password" placeholder="Password (Min. 6 chars)" style="min-height:32px; padding:6px 10px; font-size:12px;">
            <div id="popup-signup-error" style="font-size:11px; color:var(--danger); min-height:0; text-align:center; font-weight:600;"></div>
            <button type="button" id="popup-submit-signup" class="save-btn" style="min-height:34px; padding:6px; font-size:12.5px; margin-top:2px;">Create Account</button>
          </div>

          <div style="display: flex; align-items: center; margin: 4px 0 2px;">
            <div style="flex-grow: 1; border-top: 1px solid var(--border); height: 1px;"></div>
            <span style="margin: 0 8px; font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">or</span>
            <div style="flex-grow: 1; border-top: 1px solid var(--border); height: 1px;"></div>
          </div>
          
          <button type="button" id="popup-google-btn" class="save-btn" style="background: var(--panel-muted); color: var(--text); border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 34px; padding: 6px; font-size: 12.5px; cursor: pointer; box-shadow: none;">
            <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
          </button>
        </div>
      </div>

      <!-- Action Button -->
      <button id="save-btn" class="save-btn">
        <span class="btn-text">Save Settings</span>
        <span class="spinner hidden"></span>
      </button>
      
      <div id="save-success" class="save-success hidden">
        <span class="success-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </span> Settings saved
      </div>
    </main>

    <footer class="footer">
      <p>Select text in any field, then use ScribeAI to refine it in place.</p>
    </footer>
  </div>

  <script src="supabase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
